prod:
  instances:
    galaxyservers:
      - name: galaxy
        flavor: p8-30gb
        security_groups: [usegal, web, usegal-tusd, usegal-slurm]
    dbservers:
      - name: db
        flavor: p4-7.5gb
        security_groups: [usegal, usegal-psql]
    monitorservers:
      - name: monitor
        flavor: p8-30gb
        security_groups:
          [usegal, usegal-influxdb, usegal-grafana, usegal-sentry]
    nfsservers:
      - name: nfs
        flavor: p4-7.5gb
        security_groups: [usegal, usegal-nfs]
    squidservers:
      - name: squid
        flavor: p4-7.5gb
        security_groups: [usegal, usegal-squid]
    slurmcontrolservers:
      - name: slurmcontrol
        flavor: p4-7.5gb
        security_groups: [usegal, usegal-slurm]
    slurmexecservers:
      - name: slurmexec
        flavor: p8-30gb
        security_groups: [usegal, usegal-slurm]
        count: 8
      - name: slurmfat
        flavor: c32-240gb
        security_groups: [usegal, usegal-slurm]
        count: 2
  volumes:
    - name: db-volume
      type: volumes-ssd
      size: 300
      attach_to: db
    - name: monitor-volume
      type: volumes-ssd
      size: 300
      attach_to: monitor
    - name: nfs-volume
      type: volumes-ec
      size: 40000
      attach_to: nfs
    - name: cvmfs-volume
      type: volumes-ec
      size: 500
      attach_to: squid
  floating_ips:
    - ip: 198.168.187.40
      attach_to: galaxy

