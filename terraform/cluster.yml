prod:
  instances:
    galaxyservers:
      - name: galaxy
        volume_size: 1000
        volume_type: volumes-ec
        flavor: p8-30gb
        security_groups: [usegal, web, usegal-tusd, usegal-slurm]
    dbservers:
      - name: db
        flavor: p4-7.5gb
        security_groups: [usegal, usegal-psql]
    monitorservers:
      - name: monitor
        flavor: p8-30gb
        security_groups:
          [usegal, usegal-influxdb, usegal-grafana, usegal-sentry]
    nfsservers:
      - name: nfs
        fixed_ip: 172.16.59.160
        flavor: p8-30gb
        security_groups: [usegal, usegal-nfs]
    squidservers:
      - name: squid
        flavor: p4-7.5gb
        security_groups: [usegal, usegal-squid]
    slurmcontrolservers:
      - name: slurmcontrol
        flavor: p4-7.5gb
        security_groups: [usegal, usegal-slurm]
    slurmexecservers:
      - name: slurmexec-xs
        volume_size: 1000
        volume_type: volumes-ec
        flavor: p4-15gb
        security_groups: [usegal, usegal-slurm]
        count: 10
      - name: slurmexec-sm
        volume_size: 1000
        volume_type: volumes-ec
        flavor: c8-30gb
        security_groups: [usegal, usegal-slurm]
        count: 20
      - name: slurmexec-md
        volume_size: 1000
        volume_type: volumes-ec
        flavor: c16-60gb
        security_groups: [usegal, usegal-slurm]
        count: 10
      - name: slurmexec-lg
        volume_size: 1000
        volume_type: volumes-ec
        flavor: c16-120gb
        security_groups: [usegal, usegal-slurm]
        count: 4
      - name: slurmexec-xl
        volume_size: 1000
        volume_type: volumes-ec
        flavor: c32-240gb
        security_groups: [usegal, usegal-slurm]
        count: 2
  volumes:
    db:
      - name: db-volume-zfs
        type: volumes-ssd
        fstype: zfs
        size: 500
    monitor:
      - name: monitor-volume-zfs
        type: volumes-ssd
        fstype: zfs
        size: 500
      - name: monitor-volume
        type: volumes-ssd
        size: 300
    nfs:
      - name: nfs-volume-zfs
        type: volumes-ec
        fstype: zfs
        size: 40000
    squid:
      - name: cvmfs-volume
        type: volumes-ec
        size: 500
  floating_ips:
    - ip: 198.168.187.40
      attach_to: galaxy

staging:
  instances:
