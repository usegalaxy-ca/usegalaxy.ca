    db:
      flavor: "p4-7.5gb"
    tus:
      flavor: "p1-2gb"
    influx:
      flavor: "p2-3.75gb"
    grafana:
      flavor: "p2-3.75gb"
    sentry:
      flavor: "p2-3.75gb"
