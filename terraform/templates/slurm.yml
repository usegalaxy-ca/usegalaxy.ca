###############################################
# This file is managed by Terraform. Do not edit.
###############################################

slurm_nodes:
%{ for group_name, hosts in nodes ~}
%{ if group_name == "slurmexecservers" ~}
%{ for host in hosts ~}
  - name: ${host.name}
    CPUs: ${host.cpu}
    RealMemory: ${host.mem}
    Weight: ${host.mem}
%{ endfor ~}
%{ endif ~}
%{ endfor ~}

slurm_partitions:
  - name: training
    Default: NO
    MaxTime: UNLIMITED
    Nodes: ALL
  - name: main
    Default: YES
    MaxTime: UNLIMITED
    Nodes: %{ for host in hosts ~}%{ if not "0" in host.name }${ host.name }%{ endif ~}%{ if loop.last ~},%{ endif ~}%{ endfor ~}
