- hosts: slurmcontrolservers,slurmexecservers
  become: true
  become_user: root
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/galaxyservers.yml
  tasks:
    - name: restart machine
      command: reboot
    - name: mount nfs
      command: mount /mnt/nfs
    - name: turn on nfs-kernel-server
      systemd:
        name: nfs-kernel-server
        state: started
