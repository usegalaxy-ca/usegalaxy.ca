- hosts: slurmcontrolservers,slurmexecservers,galaxyservers
  become: true
  become_user: root
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/galaxyservers.yml
  tasks:
    - name: turn off nfs-kernel-server
      systemd:
        name: nfs-kernel-server
        state: stopped
    - name: kill all processes using nfs
      shell: fuser -km /mnt/nfs
    - name: unmount nfs
      command: umount -f /mnt/nfs
      register: result
      retries: 5
      delay: 10
      until: result is not failed
      failed_when: result.stderr.find('busy') != -1
    - name: remount nfs
      command: mount /mnt/nfs
    - name: turn on nfs-kernel-server
      systemd:
        name: nfs-kernel-server
        state: started
