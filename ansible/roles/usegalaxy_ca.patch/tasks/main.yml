---
- name: Patch LoginForm
  copy:
    src: LoginForm.vue
    dest: /mnt/nfs/galaxy/server/client/src/components/Login/LoginForm.vue
    owner: pgalaxy
    group: pgalaxy
    mode: 664

- name: Patch ExternalLogin
  copy:
    src: ExternalLogin.vue
    dest: /mnt/nfs/galaxy/server/client/src/components/User/ExternalIdentities/ExternalLogin.vue
    owner: pgalaxy
    group: pgalaxy
    mode: 664

- name: Build client
  make:
    chdir: "{{ galaxy_server_dir }}"
    target: "{{ galaxy_client_make_target }}"
  environment:
    PATH: "{{ galaxy_venv_dir }}/bin:{{ ansible_env.PATH }}"
    VIRTUAL_ENV: "{{ galaxy_venv_dir }}"
