---
- hosts: nfsservers
  become: true
  become_user: root
  vars_files:
    - group_vars/secret.yml
    - group_vars/terraform.yml
    - group_vars/galaxyservers.yml
  roles:
    - usegalaxy_ca.volume
    - usegalaxy_ca.nfs_server

- hosts: squidservers
  become: true
  become_user: root
  vars_files:
    - group_vars/terraform.yml
    - group_vars/galaxyservers.yml
    - group_vars/cvmfsservers.yml
  roles:
    - usegalaxy_ca.volume
    - usegalaxy_ca.squid
    - laperlej.cvmfs

- hosts: slurmcontrolservers
  become: true
  become_user: root
  vars:
    slurm_roles: ["controller"]
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/galaxyservers.yml
  roles:
    - usegalaxy_ca.nfs_client
    - usegalaxy_ca.slurm
    - galaxyproject.repos
    - galaxyproject.slurm

- hosts: slurmexecservers
  become: true
  become_user: root
  vars:
    slurm_roles: ["exec"]
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/galaxyservers.yml
    - group_vars/cvmfsclient.yml
  pre_tasks:
    - name: install dependencies
      package:
        name:
          [
            "acl",
            "bzip2",
            "git",
            "make",
            "tar",
            "python3-venv",
            "python3-setuptools",
          ]
      tags:
        - always
  roles:
    - usegalaxy_ca.nfs_client
    - usegalaxy_eu.apptainer
    - laperlej.cvmfs
    - usegalaxy_ca.slurm
    - galaxyproject.repos
    - galaxyproject.slurm

- hosts: galaxyservers
  become: true
  become_user: root
  vars:
    slurm_roles: ["exec"]
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/cvmfsclient.yml
  pre_tasks:
    - name: install dependencies
      package:
        name:
          [
            "acl",
            "bzip2",
            "git",
            "make",
            "tar",
            "python3-venv",
            "python3-setuptools",
          ]
      tags:
        - always
  roles:
    - usegalaxy_ca.nfs_client
    - usegalaxy_ca.slurm
    - galaxyproject.repos
    - galaxyproject.slurm
    - usegalaxy_eu.apptainer
    - laperlej.cvmfs
    - usegalaxy_ca.drmaa
