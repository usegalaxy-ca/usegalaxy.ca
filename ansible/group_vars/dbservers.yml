  postgres_extra:
    plugin: "exec"
    config:
      - commands = [
        "{{ telegraf_env }} {{ gxadmin_path }} iquery pg-cache-hit",
        "{{ telegraf_env }} {{ gxadmin_path }} iquery pg-index-size",
        "{{ telegraf_env }} {{ gxadmin_path }} iquery pg-index-usage",
        "{{ telegraf_env }} {{ gxadmin_path }} iquery pg-table-bloat",
        "{{ telegraf_env }} {{ gxadmin_path }} iquery pg-table-size",
        "{{ telegraf_env }} {{ gxadmin_path }} iquery pg-unused-indexes",
        "{{ telegraf_env }} {{ gxadmin_path }} iquery pg-vacuum-stats",
