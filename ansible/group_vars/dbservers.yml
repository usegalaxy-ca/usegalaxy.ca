  galaxy_uploaded:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery upload-gb-in-past-hour"]
      - timeout = "600s"
      - data_format = "influx"
      - interval = "1h"
  galaxy_jobs_queued:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery jobs-queued"]
      - timeout = "15s"
      - data_format = "influx"
      - interval = "1m"
  galaxy_jobs_queued_internal:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery jobs-queued-internal-by-handler"]
      - timeout = "15s"
      - data_format = "influx"
      - interval = "1m"
  galaxy_jobs_queue_overview:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery queue-overview --short-tool-id"]
      - timeout = "30s"
      - data_format = "influx"
      - interval = "1m"
  galaxy_jobs_destination_overview:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery queue --by destination"]
      - timeout = "30s"
      - data_format = "influx"
      - interval = "1m"
  galaxy_oidc:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery users-with-oidc"]
      - timeout = "15s"
      - data_format = "influx"
      - interval = "1m"
  galaxy_workflow:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery workflow-invocation-status"]
      - timeout = "15s"
      - data_format = "influx"
      - interval = "1m"
  galaxy_workflow_totals:
    plugin: "exec"
    config:
      - commands = ["{{ telegraf_env }} {{ gxadmin_path }} iquery workflow-invocation-totals"]
      - timeout = "15s"
      - data_format = "influx"
      - interval = "1m"
