---
- hosts: nfsservers
  become: true
  become_user: root
  vars_files:
    - group_vars/secret.yml
    - group_vars/terraform.yml
    - group_vars/galaxyservers.yml
  roles:
    - role: usegalaxy_ca.volume
      tags:
        - volume
        - nfs
    - role: usegalaxy_ca.nfs_server
      tags:
        - nfs
    - role: dj-wasabi.telegraf
      tags:
        - monitor
    - role: usegalaxy_ca.backup_tsm
      tags:
        - backup

- hosts: squidservers
  become: true
  become_user: root
  vars_files:
    - group_vars/terraform.yml
    - group_vars/galaxyservers.yml
    - group_vars/cvmfsservers.yml
  roles:
    - role: usegalaxy_ca.volume
      tags:
        - volume
    - role: usegalaxy_ca.squid
      tags:
        - volume
        - cvmfs
    - role: laperlej.cvmfs
      tags:
        - cvmfs
    - role: dj-wasabi.telegraf
      tags:
        - monitor

- hosts: slurmcontrolservers
  become: true
  become_user: root
  vars:
    slurm_roles: ["controller"]
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/galaxyservers.yml
  roles:
    - role: usegalaxy_ca.nfs_client
      tags:
        - nfs
    - role: usegalaxy_ca.slurm
      tags:
        - slurm
    - role: galaxyproject.repos
      tags:
        - slurm
    - role: galaxyproject.slurm
      tags:
        - slurm
    - role: dj-wasabi.telegraf
      tags:
        - monitor

- hosts: slurmexecservers
  become: true
  become_user: root
  vars:
    slurm_roles: ["exec"]
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/galaxyservers.yml
    - group_vars/cvmfsclient.yml
  pre_tasks:
    - name: install dependencies
      package:
        name:
          [
            "acl",
            "bzip2",
            "git",
            "make",
            "tar",
            "python3-venv",
            "python3-setuptools",
          ]
      tags:
        - always
  roles:
    - role: usegalaxy_ca.nfs_client
      tags:
        - nfs
    - role: usegalaxy_eu.apptainer
      tags:
        - cvmfs
    - role: laperlej.cvmfs
      tags:
        - cvmfs
    - role: usegalaxy_ca.slurm
      tags:
        - slurm
    - role: galaxyproject.repos
      tags:
        - slurm
    - role: galaxyproject.slurm
      tags:
        - slurm
    - role: dj-wasabi.telegraf
      tags:
        - monitor

- hosts: dbservers
  become: true
  become_user: root
  vars_files:
    - group_vars/secret.yml
    - group_vars/terraform.yml
  pre_tasks:
    - name: install dependencies
      package:
        name: "acl"
      tags:
        - always
  roles:
    - role: usegalaxy_ca.volume
      tags:
        - volume
    - role: usegalaxy_ca.postgresql
      tags:
        - postgres
    - role: galaxyproject.postgresql
      tags:
        - postgres
    - role: usegalaxy_ca.restart_postgres
      tags:
        - never
    - role: galaxyproject.postgresql_objects
      become: true
      become_user: postgres
      tags:
        - postgres
    - role: usegalaxy_ca.gxadmin
      tags:
        - monitor
    - role: galaxyproject.gxadmin
      tags:
        - monitor
    - role: dj-wasabi.telegraf
      tags:
        - monitor
    - role: usegalaxy_ca.backup_pg
      tags:
        - postgres
    - role: usegalaxy_ca.backup_tsm
      tags:
        - backup

- hosts: galaxyservers
  become: true
  become_user: root
  vars:
    slurm_roles: ["exec"]
  vars_files:
    - group_vars/secret.yml
    - group_vars/slurm.yml
    - group_vars/cvmfsclient.yml
  pre_tasks:
    - name: install dependencies
      package:
        name:
          [
            "acl",
            "bzip2",
            "git",
            "make",
            "tar",
            "python3-venv",
            "python3-setuptools",
          ]
      tags:
        - always
  roles:
    - role: usegalaxy_ca.nfs_client
      tags:
        - nfs
    - role: usegalaxy_ca.slurm
      tags:
        - slurm
    - role: galaxyproject.repos
      tags:
        - slurm
    - role: galaxyproject.slurm
      tags:
        - slurm
    - role: usegalaxy_eu.apptainer
      tags:
        - cvmfs
    - role: galaxyproject.tusd
      tags:
        - tusd
    - role: galaxyproject.galaxy
      tags:
        - galaxy
    - role: galaxyproject.miniconda
      become: true
      become_user: "{{ galaxy_user_name }}"
      tags:
        - galaxy
    - role: usegalaxy_ca.maintenance
      tags:
        - proxy
    - role: galaxyproject.nginx
      tags:
        - proxy
    - role: laperlej.cvmfs
      tags:
        - cvmfs
    - role: usegalaxy_ca.drmaa
    - role: usegalaxy_ca.restart_galaxy
      become: true
      become_user: root
      tags:
        - galaxy
    - role: usegalaxy_ca.service_account
      become: false
      tags:
        - galaxy
    - role: dj-wasabi.telegraf
      tags:
        - monitor

  post_tasks:
    - name: fetch edugain idps the first time
      command: "bash {{ galaxy_root }}/server/cron/fetch-edugain-idps.bash"
      become: true
      become_user: pgalaxy
    - name: set cron jobs
      ansible.builtin.cron:
        name: "cron jobs to adjust allocations group for canadian users"
        minute: "*/5"
        user: pgalaxy
        job: "bash {{ galaxy_root }}/server/cron/set_new_users_allocation_groups.bash"

- hosts: monitorservers
  become: true
  become_user: root
  pre_tasks:
    - name: install dependencies
      package:
        name:
          [
            "acl",
            "bzip2",
            "git",
            "make",
            "tar",
            "python3-venv",
            "python3-setuptools",
          ]
      tags:
        - always
    - pip:
        name: [docker, docker-compose]
        tags:
          - always
  vars_files:
    - group_vars/secret.yml
    - group_vars/terraform.yml
  roles:
    - role: usegalaxy_ca.volume
      tags:
        - volume
        - monitor
        - nfs
    - role: usegalaxy_ca.monitor
      tags:
        - monitor
    - role: usegalaxy_ca.docker
      tags:
        - monitor
    - role: usegalaxy_ca.influxdb_key
      tags:
        - monitor
    - role: usegalaxy_eu.influxdb
      tags:
        - monitor
    - role: cloudalchemy.grafana
      tags:
        - monitor
    - role: dj-wasabi.telegraf
      tags:
        - monitor
    - role: mvdbeek.sentry_selfhosted
      tags:
        - monitor
    - role: usegalaxy_ca.backup_influx
      tags:
        - monitor
    - role: usegalaxy_ca.backup_tsm
      tags:
        - backup
